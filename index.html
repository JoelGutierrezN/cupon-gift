<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17110e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vale oficial — La Casa del Buen Servicio</title>
</head>
<body>
  <main class="stage">
    <div class="scene">
      <div class="deal">
        <div class="tilt">
          <div class="card">
            <div class="face front"><img src="/cupon-frente.svg" alt="Frente del cupón: válido por unos pellejos"></div>
            <div class="face back"><img src="/cupon-reverso.svg" alt="Reverso del cupón: instrucciones y condiciones"></div>
          </div>
        </div>
      </div>
      <div class="shine"></div>
      <div class="flip-hint" aria-hidden="true">
        <span class="flip-hint__ripple"></span>
        <svg class="flip-hint__hand" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.21 0-.62-.38-1.16-.91-1.38z"/>
        </svg>
        <span class="flip-hint__text">Tócame para girar</span>
      </div>
    </div>
  </main>

  <div class="intro" aria-hidden="true">
    <div class="lights">
      <div class="rays"></div>
      <div class="halo"></div>
    </div>
    <div class="sparkles"></div>

    <div class="frame">
      <i class="fr fr-top"></i>
      <i class="fr fr-right"></i>
      <i class="fr fr-bottom"></i>
      <i class="fr fr-left"></i>
      <i class="fr-corner tl"></i>
      <i class="fr-corner tr"></i>
      <i class="fr-corner br"></i>
      <i class="fr-corner bl"></i>
    </div>

    <div class="envelope">
      <div class="env-paper"></div>
      <div class="env-flap"></div>
      <div class="env-seal"><span>XV</span></div>
      <span class="env-hint">¡Pégale al sobre!</span>
    </div>

    <div class="greeting">
      <p class="greet-top">Felices</p>
      <div class="roman"><span class="roman-ink">XV</span></div>
      <p class="greet-bottom">años</p>
    </div>

    <p class="emotion"></p>

    <div class="handwrite"></div>

    <div class="suspense-dim"></div>
    <div class="suspense">
      <p class="suspense-line"></p>
      <div class="drumroll"><i></i><i></i><i></i></div>
    </div>

    <div class="stamp">se vienen pellejos</div>

    <div class="vignette"></div>
    <div class="grain"></div>
  </div>
  <canvas class="confetti-canvas" aria-hidden="true"></canvas>

  <div class="rotate-gate" role="alertdialog" aria-live="assertive">
    <div class="rotate-gate__inner">
      <div class="phone" aria-hidden="true"></div>
      <p class="rotate-gate__title">Gira tu teléfono</p>
      <p class="rotate-gate__text">Pon tu celular en horizontal para ver el vale.</p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
