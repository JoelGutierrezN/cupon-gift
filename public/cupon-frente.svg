<text class="sans" x="340" y="330" text-anchor="middle" font-size="11" fill="#3A241A" opacity="0.7">*Corte premium sujeto a disponibilidad y a lo que sobró del asador. No reembolsable ni transferible.</text>
<text class="sans" x="340" y="344" text-anchor="middle" font-size="11" fill="#3A241A" opacity="0.7">Canjeable solo en la próxima peda. La casa no responde por la calidad ni por las risas.</text>
